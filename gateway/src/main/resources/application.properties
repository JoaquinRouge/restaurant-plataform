# API Gateway
spring.application.name=api-gateway

server.port=${PORT:8080}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Security
# NOTE: the design is JWT validated at the gateway; a SecurityFilterChain is still pending in code.
# These defaults keep the service startable and predictable in dev.
spring.security.user.name=${GATEWAY_BASIC_USER:gateway}
spring.security.user.password=${GATEWAY_BASIC_PASSWORD:gateway}

# JWT (for when the SecurityFilterChain is added)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}
