# Auth Service
spring.application.name=auth-service

server.port=${PORT:8081}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# MySQL
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/restaurant_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${AUTH_DB_USER:restaurant}
spring.datasource.password=${AUTH_DB_PASSWORD:restaurant}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
