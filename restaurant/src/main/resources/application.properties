# Restaurant Service
spring.application.name=restaurant-service

server.port=${PORT:8085}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# MySQL
spring.datasource.url=${RESTAURANT_DB_URL:jdbc:mysql://localhost:3306/restaurant_restaurant?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${RESTAURANT_DB_USER:root}
spring.datasource.password=${RESTAURANT_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
